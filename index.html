<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Basquete Local - 2 Jogadores</title>
    <style>
        body { margin: 0; overflow: hidden; background: #333; font-family: sans-serif; }
        #game-container {
            position: relative;
            width: 800px;
            height: 400px;
            margin: 50px auto;
            background: #e97451; /* Cor de quadra */
            border: 5px solid #fff;
            border-bottom: 15px solid #555;
            overflow: hidden;
        }
        /* Divisor central */
        .half-line {
            position: absolute;
            left: 50%;
            width: 2px;
            height: 100%;
            background: rgba(255,255,255,0.5);
        }
        /* Placar */
        #scoreboard {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            font-size: 24px;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px #000;
        }
        .player {
            position: absolute;
            width: 30px;
            height: 50px;
            bottom: 0;
        }
        #p1 { background: blue; left: 100px; }
        #p2 { background: red; right: 100px; }
        
        .ball {
            position: absolute;
            width: 20px;
            height: 20px;
            background: orange;
            border-radius: 50%;
            border: 1px solid #000;
            display: none;
        }
        /* Cestas */
        .hoop {
            position: absolute;
            top: 150px;
            width: 40px;
            height: 10px;
            background: red;
        }
        .hoop.left { left: 0; }
        .hoop.right { right: 0; }
    </style>
</head>
<body>

<div id="scoreboard">JOGADOR 1: <span id="s1">0</span> | JOGADOR 2: <span id="s2">0</span></div>

<div id="game-container" id="court">
    <div class="half-line"></div>
    <div id="hoop-left" class="hoop left"></div>
    <div id="hoop-right" class="hoop right"></div>
    <div id="p1" class="player"></div>
    <div id="p2" class="player"></div>
    <div id="ball1" class="ball"></div>
    <div id="ball2" class="ball"></div>
</div>

<script>
    const config = {
        gravity: 0.6,
        jumpForce: -12,
        speed: 5,
        courtWidth: 800,
        courtHeight: 400
    };

    const gameState = {
        p1: { x: 100, y: 0, vy: 0, score: 0, jumping: false, ball: { active: false, x: 0, y: 0, vx: 0, vy: 0 } },
        p2: { x: 670, y: 0, vy: 0, score: 0, jumping: false, ball: { active: false, x: 0, y: 0, vx: 0, vy: 0 } }
    };

    const keys = {};
    document.addEventListener('keydown', e => keys[e.code] = true);
    document.addEventListener('keyup', e => keys[e.code] = false);

    function update() {
        // Controle Jogador 1 (A, D, W para pular, Espaço para chutar)
        if (keys['KeyA'] && gameState.p1.x > 0) gameState.p1.x -= config.speed;
        if (keys['KeyD'] && gameState.p1.x < 370) gameState.p1.x += config.speed;
        if (keys['KeyW'] && !gameState.p1.jumping) {
            gameState.p1.vy = config.jumpForce;
            gameState.p1.jumping = true;
        }

        // Controle Jogador 2 (Setas e Enter para chutar)
        if (keys['ArrowLeft'] && gameState.p2.x > 400) gameState.p2.x -= config.speed;
        if (keys['ArrowRight'] && gameState.p2.x < 770) gameState.p2.x += config.speed;
        if (keys['ArrowUp'] && !gameState.p2.jumping) {
            gameState.p2.vy = config.jumpForce;
            gameState.p2.jumping = true;
        }

        // Arremessos
        if (keys['Space'] && !gameState.p1.ball.active) shoot(1);
        if (keys['Enter'] && !gameState.p2.ball.active) shoot(2);

        applyPhysics(gameState.p1, 'p1');
        applyPhysics(gameState.p2, 'p2');
        updateBall(gameState.p1.ball, 1);
        updateBall(gameState.p2.ball, 2);

        draw();
        requestAnimationFrame(update);
    }

    function applyPhysics(player, id) {
        player.vy += config.gravity;
        player.y += player.vy;

        if (player.y >= 0) {
            player.y = 0;
            player.vy = 0;
            player.jumping = false;
        }
    }

    function shoot(playerNum) {
        const p = gameState[`p${playerNum}`];
        p.ball.active = true;
        p.ball.x = p.x + 15;
        p.ball.y = 350 + p.y;
        p.ball.vy = -15;
        p.ball.vx = playerNum === 1 ? 7 : -7;
    }

    function updateBall(ball, playerNum) {
        if (!ball.active) return;

        ball.vy += config.gravity;
        ball.x += ball.vx;
        ball.y += ball.vy;

        // Colisão com a cesta adversária
        if (playerNum === 1 && ball.x > 760 && ball.y < 160 && ball.y > 140) {
            gameState.p1.score++;
            resetBall(ball);
        }
        if (playerNum === 2 && ball.x < 40 && ball.y < 160 && ball.y > 140) {
            gameState.p2.score++;
            resetBall(ball);
        }

        // Saiu da tela ou chão
        if (ball.y > 400 || ball.x < 0 || ball.x > 800) {
            resetBall(ball);
        }
    }

    function resetBall(ball) {
        ball.active = false;
    }

    function draw() {
        const p1El = document.getElementById('p1');
        const p2El = document.getElementById('p2');
        const b1El = document.getElementById('ball1');
        const b2El = document.getElementById('ball2');

        p1El.style.transform = `translate(${gameState.p1.x}px, ${gameState.p1.y}px)`;
        p2El.style.transform = `translate(${gameState.p2.x}px, ${gameState.p2.y}px)`;

        renderBall(b1El, gameState.p1.ball);
        renderBall(b2El, gameState.p2.ball);

        document.getElementById('s1').innerText = gameState.p1.score;
        document.getElementById('s2').innerText = gameState.p2.score;
    }

    function renderBall(el, ball) {
        if (ball.active) {
            el.style.display = 'block';
            el.style.left = ball.x + 'px';
            el.style.top = ball.y + 'px';
        } else {
            el.style.display = 'none';
        }
    }

    update();
</script>

</body>
</html>
